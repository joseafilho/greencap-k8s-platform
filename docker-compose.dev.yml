services:
  db:
    image: postgres:16-alpine
    container_name: greencap-db-dev
    environment:
      POSTGRES_DB: greencap
      POSTGRES_USER: greencap
      POSTGRES_PASSWORD: dev123
    ports:
      - "5432:5432"
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greencap -d greencap"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata-dev:
