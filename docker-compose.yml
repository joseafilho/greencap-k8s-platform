services:

  greencap:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: greencap-k8s:latest
    container_name: greencap
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/greencap
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-greencap}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-changeme}
      GREENCAP_ENCRYPTION_KEY: ${ENCRYPTION_KEY:?ENCRYPTION_KEY obrigatória no .env}
      VAADIN_PRODUCTION: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - greencap-net

  db:
    image: postgres:16-alpine
    container_name: greencap-db
    environment:
      POSTGRES_DB: greencap
      POSTGRES_USER: ${DB_USER:-greencap}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-greencap} -d greencap"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - greencap-net

networks:
  greencap-net:
    driver: bridge

volumes:
  pgdata:
