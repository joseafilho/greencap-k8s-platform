    app.kubernetes.io/component: api
    app.kubernetes.io/managed-by: greencap
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
