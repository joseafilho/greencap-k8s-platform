apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: greencap-demo
  labels:
    app.kubernetes.io/managed-by: greencap
data:
  APP_ENV: "production"
  APP_LOG_LEVEL: "info"
  APP_PORT: "8080"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  CACHE_TTL_SECONDS: "300"
  MAX_CONNECTIONS: "50"
